# Tiny Tapeout project information
project:
  title:        "APB I2C Master/Slave Core"
  author:       "shivamtiwari020505"
  discord:      ""
  description:  "Full I2C master/slave controller with FIFOs, IRQ, and Tiny Tapeout byte host bridge"
  language:     "Verilog"
  clock_hz:     50000000

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "2x2"

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_shivamtiwari020505_i2c"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "clk_divider.v"
    - "apb_slave_if.v"
    - "sync_fifo.v"
    - "reg_file.v"
    - "i2c_master_fsm.v"
    - "i2c_slave_fsm.v"
    - "i2c_line_filter.v"
    - "i2c_top_split_io.v"
    - "tt_um_shivamtiwari020505_i2c.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "HOST_DATA0"
  ui[1]: "HOST_DATA1"
  ui[2]: "HOST_DATA2"
  ui[3]: "HOST_DATA3"
  ui[4]: "HOST_DATA4"
  ui[5]: "HOST_DATA5"
  ui[6]: "HOST_DATA6"
  ui[7]: "HOST_DATA7"

  # Outputs
  uo[0]: "HOST_RDATA0"
  uo[1]: "HOST_RDATA1"
  uo[2]: "HOST_RDATA2"
  uo[3]: "HOST_RDATA3"
  uo[4]: "HOST_RDATA4"
  uo[5]: "HOST_RDATA5"
  uo[6]: "HOST_RDATA6"
  uo[7]: "HOST_RDATA7"

  # Bidirectional pins
  uio[0]: "SDA"
  uio[1]: "SCL"
  uio[2]: "WR_STROBE"
  uio[3]: "RD_STROBE"
  uio[4]: "REG_SEL"
  uio[5]: "IRQ"
  uio[6]: "IRQ_CLEAR"
  uio[7]: "WRAPPER_ERR"

# Do not change!
yaml_version: 6

